#
# Runs the pytest suite on every push to main and on every pull request.
# Uses uv (the same tool the project develops with) so CI matches local dev.

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (Python 3.14)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # Cache uv's package downloads between runs to speed up CI.
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies (incl. dev group)
        run: uv sync --all-groups

      - name: Run pytest
        run: uv run pytest
